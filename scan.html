<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A1714">
<meta name="mobile-web-app-capable" content="yes">
<title>Resale Scout — Scan ISBN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
     background:#1A1714;color:#FAF7F2;min-height:100vh;
     display:flex;flex-direction:column}
.header{background:#2D2926;padding:12px 16px;display:flex;
        align-items:center;justify-content:space-between;
        border-bottom:1px solid #3D3530;flex-shrink:0}
.header h1{font-size:15px;font-weight:500}
.row-badge{font-size:11px;background:#B8860B;color:#1A1714;
           padding:3px 10px;border-radius:10px;font-weight:700}
.scanner-wrap{position:relative;background:#000;width:100%;
              max-height:55vh;overflow:hidden;flex-shrink:0}
#video{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;pointer-events:none}
.body{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.status{text-align:center;padding:8px;font-size:13px;color:#8A837A;
        border-radius:6px;line-height:1.5;min-height:32px}
.status.active{color:#B8860B;font-weight:500}
.status.success{background:#1A3A2A;color:#4ADE80;font-weight:600}
.status.error{background:#3A1A1A;color:#F87171}
.result-card{background:#2D2926;border-radius:10px;padding:14px;display:none}
.result-isbn{font-family:monospace;font-size:20px;color:#B8860B;
             letter-spacing:2px;margin-bottom:8px;word-break:break-all}
.result-book{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:3px}
.result-meta{font-size:12px;color:#8A837A;line-height:1.5}
.saved-badge{display:none;margin-top:8px;background:#1A3A2A;
             color:#4ADE80;font-size:11px;padding:3px 10px;
             border-radius:10px;font-weight:500}
.btn{width:100%;padding:13px;border:none;border-radius:10px;
     font-size:15px;font-weight:600;cursor:pointer;
     -webkit-tap-highlight-color:transparent}
.btn:active{opacity:.75}
.btn-gold{background:#B8860B;color:#1A1714}
.btn-dim{background:#2D2926;color:#8A837A;
         border:1px solid #3D3530;font-size:13px}
.manual-label{font-size:11px;color:#4A4540;text-align:center;margin-bottom:5px}
.manual-row{display:flex;gap:8px}
.isbn-input{flex:1;padding:11px 12px;background:#2D2926;color:#FAF7F2;
            border:1px solid #3D3530;border-radius:8px;font-size:16px;
            font-family:monospace;letter-spacing:1px;outline:none;
            -webkit-appearance:none}
.isbn-input:focus{border-color:#B8860B}
.go-btn{padding:11px 16px;background:#4A4540;color:#FAF7F2;
        border:none;border-radius:8px;font-size:14px;cursor:pointer}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #3D3530;
      border-top-color:#B8860B;border-radius:50%;
      animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <h1>📷 Scan ISBN</h1>
  <span class="row-badge" id="row-badge">Row ?</span>
</div>

<div class="scanner-wrap" id="scanner-wrap">
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <canvas id="overlay" style="display:none"></canvas>
</div>

<div class="body">
  <div class="status active" id="status">Tap button to start camera</div>

  <div class="result-card" id="result-card">
    <div class="result-isbn" id="result-isbn"></div>
    <div class="result-book" id="result-book"></div>
    <div class="result-meta" id="result-meta"></div>
    <div class="saved-badge" id="saved-badge">✓ Saved to Google Sheet</div>
  </div>

  <button class="btn btn-gold" id="start-btn" onclick="startCamera()">
    Start camera
  </button>
  <button class="btn btn-dim" id="rescan-btn" onclick="resetScanner()" style="display:none">
    Scan another barcode
  </button>

  <div>
    <div class="manual-label">— or enter ISBN manually —</div>
    <div class="manual-row">
      <input type="text" id="isbn-input" class="isbn-input"
             placeholder="9780000000000" inputmode="numeric" maxlength="17"
             onkeydown="if(event.key==='Enter')manualGo()">
      <button class="go-btn" onclick="manualGo()">Go</button>
    </div>
  </div>
</div>

<script>
// ── URL PARAMS ─────────────────────────────────────
var p       = new URLSearchParams(location.search);
var ROW     = p.get('row')    || '?';
var SHEET   = p.get('sheet')  || 'Books';
// Apps Script URL hardcoded — update this line when you redeploy
var SCRIPT = 'https://script.google.com/macros/s/AKfycbw0M1w8_5BR95UqukFk0fxxpWEqm8IclikoRG4S3hGDCoztHNCQeG1T2YXEOHelMrLFVw/exec';
document.getElementById('row-badge').textContent = 'Row ' + ROW;



// ── STATE ──────────────────────────────────────────
var stream     = null;
var scanTimer  = null;
var detector   = null;
var scanning   = false;

// ── HELPERS ────────────────────────────────────────
function setStatus(html, cls) {
  var el = document.getElementById('status');
  el.innerHTML = html;
  el.className = 'status ' + (cls || '');
}
function spin() { return '<span class="spin"></span>'; }

// ── CAMERA START ───────────────────────────────────
async function startCamera() {
  document.getElementById('start-btn').style.display = 'none';
  setStatus('Starting camera...', 'active');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' },
               width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    var video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    setStatus('Camera on — hold barcode steady in frame', 'active');
    beginScanning(video);
  } catch(err) {
    setStatus('Camera error: ' + err.message + '. Use manual entry below.', 'error');
    document.getElementById('start-btn').style.display = 'block';
  }
}

// ── SCANNING ───────────────────────────────────────
async function beginScanning(video) {
  scanning = true;

  // ── METHOD 1: Native BarcodeDetector (Android Chrome 83+) ──
  if (typeof BarcodeDetector !== 'undefined') {
    setStatus('Scanning... (hold barcode steady)', 'active');
    try {
      detector = new BarcodeDetector({ formats: ['ean_13','ean_8','isbn'] });
    } catch(e) {
      detector = new BarcodeDetector(); // fallback: all formats
    }
    scanWithNativeDetector(video);
    return;
  }

  // ── METHOD 2: Canvas + image data polling ──
  // Capture frames to canvas and use a simple pattern match
  // as fallback when BarcodeDetector isn't available
  setStatus('Scanning... (tap barcode area if it doesn\'t auto-detect)', 'active');
  scanWithCanvas(video);
}

// Native BarcodeDetector loop
async function scanWithNativeDetector(video) {
  if (!scanning) return;
  try {
    var barcodes = await detector.detect(video);
    for (var i = 0; i < barcodes.length; i++) {
      var raw = barcodes[i].rawValue || '';
      var isbn = raw.replace(/[^0-9X]/gi, '');
      if (isbn.length === 13 || isbn.length === 10) {
        onFound(isbn); return;
      }
    }
  } catch(e) { /* keep going */ }
  if (scanning) scanTimer = setTimeout(function(){ scanWithNativeDetector(video); }, 200);
}

// Canvas frame capture — tap to capture a frame and extract digits
function scanWithCanvas(video) {
  // Show a "tap to scan" button overlay approach
  setStatus('BarcodeDetector not available on this browser. Use manual entry or try Chrome on Android 9+.', 'error');
  document.getElementById('start-btn').textContent = 'Capture frame';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('start-btn').onclick = function() { captureFrame(video); };
}

function captureFrame(video) {
  var canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  // Send frame to Gemini to read the printed ISBN digits
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  document.getElementById('start-btn').style.display = 'none';
  readWithGemini(dataUrl);
}

// ── GEMINI FALLBACK (reads printed digits, not barcode lines) ──
async function readWithGemini(dataUrl) {
  setStatus(spin() + 'Reading ISBN digits from image...', 'active');
  // Gemini key passed via URL or prompt
  var gkey = p.get('gkey') || '';
  if (!gkey) {
    gkey = prompt('Enter your Gemini API key to read the barcode image:');
    if (!gkey) { setStatus('No API key. Use manual entry below.', 'error'); return; }
  }
  try {
    var base64 = dataUrl.split(',')[1];
    var resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + gkey,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [
          { inline_data: { mime_type: 'image/jpeg', data: base64 } },
          { text: 'Find the ISBN number on this book cover. The ISBN is printed as plain digits below the barcode, usually 13 digits starting with 978 or 979. Return ONLY those digits, nothing else. If not found return NOTFOUND.' }
        ]}], generationConfig: { temperature: 0, maxOutputTokens: 30 } })
      });
    var data = await resp.json();
    var raw = ((data.candidates||[])[0]||{}).content?.parts?.[0]?.text || '';
    var isbn = raw.replace(/[^0-9X]/gi,'').trim();
    if (isbn && isbn !== 'NOTFOUND' && isbn.length >= 10) {
      onFound(isbn);
    } else {
      setStatus('Could not read ISBN. Try manual entry below.', 'error');
      document.getElementById('start-btn').textContent = 'Capture another frame';
      document.getElementById('start-btn').style.display = 'block';
    }
  } catch(e) {
    setStatus('Read failed: ' + e.message, 'error');
  }
}

// ── ON BARCODE FOUND ───────────────────────────────
function onFound(isbn) {
  scanning = false;
  if (scanTimer) clearTimeout(scanTimer);
  if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
  if (navigator.vibrate) navigator.vibrate(100);

  setStatus('✓ Barcode detected!', 'success');
  document.getElementById('result-isbn').textContent = isbn;
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('rescan-btn').style.display = 'block';

  saveToSheet(isbn);
}

// ── SAVE TO SHEET ──────────────────────────────────
function saveToSheet(isbn) {
  setStatus(spin() + 'Saving to sheet...', 'active');

  var cbName = 'rs_cb_' + Date.now();

  var timer = setTimeout(function() {
    cleanup();
    document.getElementById('saved-badge').style.display = 'inline-block';
    setStatus('\u2713 ISBN ' + isbn + ' sent to sheet (Row ' + ROW + ')', 'success');
    lookupBookClientSide(isbn);
  }, 10000);

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    var el = document.getElementById('_jsonp_tag');
    if (el) el.remove();
  }

  window[cbName] = function(result) {
    cleanup();
    if (result && result.success) {
      document.getElementById('saved-badge').style.display = 'inline-block';
      setStatus('\u2713 Saved to Row ' + ROW, 'success');
      lookupBookClientSide(isbn);
    } else {
      setStatus('Error: ' + (result && result.error ? result.error : 'unknown'), 'error');
    }
  };

  var s = document.createElement('script');
  s.id = '_jsonp_tag';
  s.src = SCRIPT
    + '?action=writeIsbn'
    + '&row='      + encodeURIComponent(ROW)
    + '&sheet='    + encodeURIComponent(SHEET)
    + '&isbn='     + encodeURIComponent(isbn)
    + '&callback=' + cbName;
  document.head.appendChild(s);
}

async function lookupBookClientSide(isbn) {
  try {
    var url = 'https://openlibrary.org/api/books?bibkeys=ISBN:' + isbn + '&format=json&jscmd=data';
    var resp = await fetch(url);
    var json = await resp.json();
    var book = json['ISBN:' + isbn];
    if (book) {
      var authors = (book.authors||[]).map(function(a){ return a.name; }).join(', ');
      document.getElementById('result-book').textContent = book.title || '';
      document.getElementById('result-meta').textContent =
        [authors, book.publish_date, book.number_of_pages ? book.number_of_pages+' pages' : '']
        .filter(Boolean).join(' \u00b7 ');
    } else {
      // Try Google Books
      var gbUrl = 'https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn;
      var gbResp = await fetch(gbUrl);
      var gbJson = await gbResp.json();
      if (gbJson.items && gbJson.items[0]) {
        var info = gbJson.items[0].volumeInfo || {};
        document.getElementById('result-book').textContent = info.title || '';
        document.getElementById('result-meta').textContent =
          [(info.authors||[]).join(', '), (info.publishedDate||'').substring(0,4)]
          .filter(Boolean).join(' \u00b7 ');
      }
    }
  } catch(e) {
    // Book lookup failed — not critical
    document.getElementById('result-meta').textContent = 'Book data lookup failed.';
  }
}

// ── RESET ──────────────────────────────────────────
function resetScanner() {
  scanning = false;
  if (scanTimer) clearTimeout(scanTimer);
  document.getElementById('result-card').style.display  = 'none';
  document.getElementById('rescan-btn').style.display   = 'none';
  document.getElementById('saved-badge').style.display  = 'none';
  document.getElementById('start-btn').textContent = 'Start camera';
  document.getElementById('start-btn').onclick = startCamera;
  document.getElementById('start-btn').style.display = 'block';
  setStatus('Tap button to start camera', 'active');
}

// ── MANUAL ENTRY ───────────────────────────────────
function manualGo() {
  var isbn = document.getElementById('isbn-input').value.replace(/[^0-9X]/gi,'').trim();
  if (isbn.length < 9) { setStatus('Enter a valid ISBN (10 or 13 digits).', 'error'); return; }
  scanning = false;
  if (scanTimer) clearTimeout(scanTimer);
  if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
  document.getElementById('result-isbn').textContent = isbn;
  document.getElementById('result-book').textContent = '';
  document.getElementById('result-meta').textContent = '';
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('rescan-btn').style.display  = 'block';
  saveToSheet(isbn);
}
</script>
</body>
</html>
